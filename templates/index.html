<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>News App</title>
    <style>
        input {
            margin-bottom: 10px;
        }
    </style>
    <link rel="icon" type="image/svg+xml" href="/icon.svg">
</head>
<body>
<h1>News App</h1>

<form method="GET" action="/search">
    <label for="title">Title:</label>
    <input type="text" id="title" size="50" name="title" required="required"><br>
    <label for="start_date">From:</label>
    <input type="date" id="start_date" name="start_date">
    <label for="end_date">To:</label>
    <input type="date" id="end_date" name="end_date"><br>
    <label for="page_size">Number of articles:</label>
    <input type="number" id="page_size" name="page_size" value="5" required="required"><br>
    <input type="submit" value="Submit">
</form>
<hr>
<form method="GET" action="/top">
    <input type="submit" value="See top articles">
</form>
</body>
</html>
